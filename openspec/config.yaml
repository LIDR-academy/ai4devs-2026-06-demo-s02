  VineJS, @adonisjs/auth con guard access_tokens
  Frontend: React 19, Vite 7, Tailwind v4, shadcn/ui
  Tooling: Biome, simple-git-hooks, npm
rules:
  proposal:
  specs:
     - Usar el formato Given/When/Then para escenarios
